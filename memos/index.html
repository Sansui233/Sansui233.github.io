、压缩上下文记忆流有很本质的区别。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"当然，组织 skill 依旧需要架构能力，也不是想到 skill 套 skill 就能做得很好。目前 skill 调用判断完全依托于 LLM，prompt 的 weight 是不可调的，skill 一多就会有噪音，占上下文，还会影响模型效果。但这个问题是能解决的。要么大模型继续发展，要么工程方向继续推进；就算模型硬件成本真的到头了，训练个 skill PEFT，把工具和记忆对 memory 窗口的挤占问题解决掉，也完全是可行的。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"这是我第一次感觉到 AI 的应用流程开始变可靠了。从成本到架构方式到落地到发展方向，不再全是些许愿不可控的东西了。唯一的问题还是出在大模型那边，稳不下来的许愿池。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"你会发现这些 agent 接 ds 和 glm 效果都不太好，还不如 gpt 5.4 mini。国外的模型已经在向工具调用方向去特化训练了。虽然说数据可以蒸馏，但是一直蒸就会一直造成这种吃屎的赶不上热乎的现象……\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"国内也没可能出现搞研究/训练和工程一体化的独角兽公司。硅谷那种环境国内复刻不了，也并不适合国家的体系。即便到民营企业，每家大公司都有研发部门，界限也划得太清了，研发卷研发的产品卷产品的，锤子是锤子螺丝是螺丝。只除了一家，第一次面试的超大包 offer，流动超大、内部废掉的产品超多、重组也超多的那家，确实做出了一些很棒的东西。现在大概已经进不去了，因为五年过去我已经极速腐化了，简历也从不断被捞变成废纸一张了。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"还看到个有意思的：\\\"\\n    }), \\\"\\\\n\\\", _jsxs(_components.p, {\\n      children: [\\\"0424  - \\\", _jsx(_components.a, {\\n        href: \\\"https://mp.weixin.qq.com/s?__biz=MzA5NDYyNDI0MA==\u0026mid=2651960454\u0026idx=1\u0026sn=4f80bd8d5539a8888c3586bf8bc6a36e\u0026poc_token=HFZS6mmjLUQ3V8oeJs8ZbjxdLzWGyA8gfKP2H6Gx\\\",\\n        children: \\\"我们发现了 Hermes Agent 的第一个远程代码执行漏洞，但这已经不重要了\\\"\\n      })]\\n    })]\\n  });\\n}\\nfunction MDXContent(props = {}) {\\n  const {wrapper: MDXLayout} = props.components || ({});\\n  return MDXLayout ? _jsx(MDXLayout, {\\n    ...props,\\n    children: _jsx(_createMdxContent, {\\n      ...props\\n    })\\n  }) : _createMdxContent(props);\\n}\\nreturn {\\n  default: MDXContent\\n};\\n\",{\"_8\":89,\"_10\":90,\"_12\":92,\"_14\":15,\"_16\":93,\"_19\":95,\"_21\":96},\"2026-04-13 20:25:01\",[91],\"博客\",[],[18,94],9,439,\"\\\"use strict\\\";\\nconst {Fragment: _Fragment, jsx: _jsx, jsxs: _jsxs} = arguments[0];\\nfunction _createMdxContent(props) {\\n  const _co
