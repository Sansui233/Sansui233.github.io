\\\", _jsx(_components.p, {\\n      children: \\\"以“钱是万能”的观点看，可以说是博主给的钱太少了，如果像Mr Beast 先生那样周期拉长，挂上百万悬赏，也许有人能坚持下来。但就这三个学员而言，我认为依旧不好说，他们并不是自己说的那样认为钱可以让他们违背自己承受网暴的人。应该说大部分的人都是如此。如果博主打算挑选的还是普通人而不是神人，能成功的几率很小依然很小。我一直觉得做人文类自媒体的自身就得有一些神人因素在里面，比如小狸能记仇十几年（没有褒贬客观描述）并且还能坦然承认；要不，就是见多了给打磨光滑了。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"1号学员是一个高个小帅哥。小帅哥博主家庭现状是男弱女强。我觉得算是有点理想主义在里面，这个理想又太健康了，也正是这样的性格使得1号能非常和睦地接受现有的家庭结构。只不过发到抖音这种平台，就不得不真正地去认清更现实中的各种各样的有色滤镜。一旦认识更现实更残酷的观念后，理想的相处模式可能会一去不回，不过没想到吵架2周就到快离婚了……这么说是因为1号之前的状态会让我幻视某个聊到现实一点的话题就会吵的人，就像1号被网暴他的观念影响后，开启夫妻吵架也非常快。还是祝福他们，其实脱离自媒体还是有希望过得好的。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"2号女生，网暴给她的影响没有家庭大。有人是代入博主是觉得她是神人莫名其妙，但我作为一个境遇有点像人的能对这个女生的处境感同身受。她觉得晚上被网暴哭这种事情没什么，因为她家庭也很窒息，这么扛压扛惯了，大概网上骂她的点还不如家里骂她的点精准。而且就算小狸对她似乎十分斥责，我能感受到她是绝对不会因此怕小狸的，小狸算是代替她说自己不敢说的话的好人角色。她目前最大的问题还真的不是她认为的钱，假设她“叛逆”一点，把原生家庭拍出一个自述系列，按小狸说的把握好度，也能火，但目前来看没这个可能。小狸都怕她妈了更不可能去这么“不良引导”她女儿，姑娘自己也没可能自愿拍，要是掌握不好度一堆人骂她和她家人，又能承受吗？\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"3号（目前已经不）姓张的小姐线下真实是确实有点吓人。但如果说这是个赏金百万的长期项目，在这三个人里我觉得她是最有可能达成的，前提是有人拉她回来。现在只是见得少了，假以时日和对方对轰久了，迟早会由于内容与思考的深入而懒得去和对方对线的。\\\"\\n    })]\\n  });\\n}\\nfunction MDXContent(props = {}) {\\n  const {wrapper: MDXLayout} = props.components || ({});\\n  return MDXLayout ? _jsx(MDXLayout, {\\n    ...props,\\n    children: _jsx(_createMdxContent, {\\n      ...props\\n    })\\n  }) : _createMdxContent(props);\\n}\\nreturn {\\n  default: MDXContent\\n};\\n\",{\"_8\":24,\"_10\":25,\"_12\":26,\"_14\":15,\"_16\":27,\"_19\":29,\"_21\":30},\"2026-03-22 20:55:04\",[],[],[18,28],1,804,\"\\\"use strict\\\";\\nconst {Fragment: _Fragment, jsx: _jsx, jsxs: _jsxs} = arguments[0];\\nfunction _createMdxContent(props) {\\n  const _components = {\\n    p: \\\"p\\\",\\n    ...props.components\\n  };\\n  return _jsxs(_Fragment, {\\n    children: [_jsx(_components.p, {\\n      children: \\\"最近大家都在养龙虾（openclaw）。我养不动，不知道养来干嘛，评价是一代人有一代人的笔记软件。很多人会说是去探索落地的场景，这是没错，但在新技术迭代期，养龙虾和正想做点什么事其实是矛盾的。如果我研究龙虾怎么用仅仅为了探索哪里用，意味着我太闲了，我没有聚焦于当下更实际的任务，很容易陷入一种伪装的效率与伪装的努力上。我认为最好的方式是，在做事情感到烦躁时，想想龙虾能不能帮忙解决，如果能那就是一个好用法。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"但很多时候又觉得这些都不重要。太多人是为了“可能有用”而买单，也有人为了当下的流量收益而买单。就像短期股一样，不能非常理性长期的去看待一支股背后公司、技术发展前景，而是要看当下的宣传怎么样，有多少人关注这事。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"不过这些事情其实也就在比较关注技术的圈子会让人感到身边即世界。而和其他领域的人说话时，他们知道元宝千问，会关注自己要用的AI，但也不太关注龙虾。这也是为什么一些小老板更看重龙虾的价值，他“前沿”，用起来又没什么技术门槛，还能裁掉员工，三重buff。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"虚拟内容生产的赛道本身就很卷了，我觉得和之前的科技有着更本质的区别。在二十几年前是可以看到通信/计算机行业将会发展的，因为实打实可以跨距离交换多种信息。交换信息本身就是人类的生活、劳动一直在做的事情。流水线压低成本也是实体经济强相关。但从没有听说过，1 天画完图（摄影机）能让生活变得更好。虚拟技术的发展多了很多的艺术形式，这只是娱乐，人不要沉溺于娱乐并假装自己做的是实事。也许是我老了，我确实不知道龙虾能有什么用，要说机器人、无人机、VR 有用我还是会相信，尽管发展起来有些困难。怎么说都绝对不应该是龙虾。信息交换的赛道已经到头了，壁垒在人。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"说来我对用什么笔记软件也无所谓了，只要能实现我常用的几个功能就行：1能搜索，2能按时间线复习，3能打页面标签，4能自己整理页面层级。其实能把 2 做好的，只有卡片式写笔记的可以。但老实说卡片式笔记挺不符合长期体系化笔记诉求的，反映到向上汇报时结构也容易支离破碎，这是我用大纲式笔记后感觉唯一的问题。但传统笔记没有一个能做到自动生成最近的笔记卡片。所以，Notion 能不能开放api……整个插件什么的。\\\"\\n    })]\\n  });\\n}\\nfunction MDXContent(props = {}) {\\n  const {wrapper: MDXLayout} = props.components || ({});\\n  return MDXLayout ? _jsx(MDXLayout, {\\n    ...props,\\n    children: _jsx(_createMdxContent, {\\n      ...props\\n    })\\n  }) : _createMdxContent(props);\\n}\\nreturn {\\n  default: MDXContent\\n};\\n\",{\"_8\":32,\"_10\":33,\"_12\":34,\"_14\":15,\"_16\":35,\"_19\":37,\"_21\":38},\"2026-03-22 17:47:06 \",[],[],[18,36],2,217,\"\\\"use strict\\\";\\nconst {Fragment: _Fragment, jsx: _jsx, jsxs: _jsxs} = arguments[0];\\nfunction _createMdxContent(props) {\\n  const _components = {\\n    p: \\\"p\\\",\\n    ...props.components\\n  };\\n  return _jsxs(_Fragment, {\\n    children: [_jsx(_components.p, {\\n      children: \\\"感觉可以整个视监后端在 Cloudflare pages 上……然后这页面改一下做个视监。想法一大堆，你写了吗，写了吗？？其实改起来很快，但得有个时间开始废寝忘食地改……\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"而且这个页面的设计我又不满意了。不如说是以前也没有很满意，但现在更不满意了，感觉没有什么生气。但是设计又是很难的事情……最简单的方案肯定是用颜色，在平设里色彩情绪是最有用的没有之一。二是字体和行高。大家都会喜欢精致一点的东西，需要有足够小的元素，特别是在大字体时，要么字体有边角装饰要么有足够小的字。。动画是次要的，一是容易卡二是抢内容焦点。\\\"\\n    })]\\n  });\\n}\\nfunction MDXContent(props = {}) {\\n  const {wrapper: MDXLayout} = props.components || ({});\\n  return MDXLayout ? _jsx(MDXLayout, {\\n    ...props,\\n    children: _jsx(_createMdxContent, {\\n      ...props\\n    })\\n  }) : _createMdxContent(props);\\n}\\nreturn {\\n  default: MDXContent\\n};\\n\",{\"_8\":40,\"_10\":41,\"_12\":42,\"_14\":15,\"_16\":43,\"_19\":45,\"_21\":46},\"2026-03-20 00:44:49\",[],[],[18,44],3,43,\"\\\"use strict\\\";\\nconst {jsx: _jsx} = arguments[0];\\nfunction _createMdxContent(props) {\\n  const _components = {\\n    p: \\\"p\\\",\\n    ...props.components\\n  };\\n  return _jsx(_components.p, {\\n    children: \\\"无可否喜欢无聊的，纯平面的设计，体积一多了就感觉有点烦躁，像家里多了一大堆难以打扫的垃圾一样。\\\"\\n  });\\n}\\nfunction MDXContent(props = {}) {\\n  const {wrapper: MDXLayout} = props.components || ({});\\n  return MDXLayout ? _jsx(MDXLayout, {\\n    ...props,\\n    children: _jsx(_createMdxContent, {\\n      ...props\\n    })\\n  }) : _createMdxContent(props);\\n}\\nreturn {\\n  default: MDXContent\\n};\\n\",{\"_8\":48,\"_10\":49,\"_12\":50,\"_14\":15,\"_16\":51,\"_19\":53,\"_21\":54},\"2026-03-16 20:32:29\",[],[],[18,52],4,111,\"\\\"use strict\\\";\\nconst {jsx: _jsx} = arguments[0];\\nfunction _createMdxContent(props) {\\n  const _components = {\\n    p: \\\"p\\\",\\n    ...props.components\\n  };\\n  return _jsx(_components.p, {\\n    children: \\\"小时候因为比较喜欢说随便，有人就给我取外号就叫随便，但我是真随便。后面没有那么随便了，因为老说随便也会给人困扰，意味着所有小事都给别人做决策，只要对方有点良心，做决策的也是累的，只有 NPD 会狂喜。但 NPD 不开心，那现在我还是随便，也只能是随遇而安的意思。\\\"\\n  });\\n}\\nfunction MDXContent(props = {}) {\\n  const {wrapper: MDXLayout} = props.components || ({});\\n  return MDXLayout ? _jsx(MDXLayout, {\\n    ...props,\\n    children: _jsx(_createMdxContent, {\\n      ...props\\n    })\\n  }) : _createMdxContent(props);\\n}\\nreturn {\\n  default: MDXContent\\n};\\n\",{\"_8\":56,\"_10\":57,\"_12\":58,\"_14\":15,\"_16\":59,\"_19\":61,\"_21\":62},\"2026-03-13 23:00:17\",[],[],[18,60],5,1673,\"\\\"use strict\\\";\\nconst {Fragment: _Fragment, jsx: _jsx, jsxs: _jsxs} = arguments[0];\\nfunction _createMdxContent(props) {\\n  const _components = {\\n    p: \\\"p\\\",\\n    ...props.components\\n  };\\n  return _jsxs(_Fragment, {\\n    children: [_jsx(_components.p, {\\n      children: \\\"难受一会儿跑去看完全不用动脑只会治愈的大黄直播，啊真好。然后跑去看林鸽的视频，想起曾经一个没写完的 memo 叫“腾讯为什么做不出二次元游戏”，以及前老板说的他认为米哈游的成功是“懂二次元”，有了点新感受。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"“二次元现在看起来是一个很大众的爱好，但其实从始至终都是一个很小众的东西”。确实如此，首先还是要明确对二次元的理解是什么。时至今日，二次元，或者说，二次元宅文化，作为一个文化符号早就不只是指代画风，而是“故事”与“角色”。如果只说日本动漫画风，你会认为“铁臂阿童木”是二次元作品吗？似乎是动画，但和“二次元”三个字给人的刻板印象相去甚远。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"早年的二次元作品10个里5个在开美少女后宫卖麻辣2个在超雄高中生拯救世界1个在谈校园恋爱1个在开高达还有1个转生到异世界。对于我而言，要素有三点，“青春” + “剧情” + “角色塑造”。青春不是指校园，而是外表年龄和心理年龄，活了几百年的老登都香香的（不）。真正的现实向恋老癖，没有。剧情是一个基本要素，但不突出，只有带有强烈的“角色塑造”才让二次元味真正凸显出来。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"我碰到真二次元的作品其实喜欢不起来，特别是日乙。玩 FGO 前期时让我坚持玩下去的只有一个念头“大家都说神，看看有什么好看的” 。到后期也是基本一开 FGO 的日常就能睡着……如果我是偶尔看到的 FGO，应该玩不到1小时就放弃了。二次元在“角色”上发力有时会将角色高于剧情，此时我就会觉得索然无味只想跳过，但真跳了之后会看不懂又头疼。还有的游戏剧情节奏一直在线，但会让人一直在想为什么驾驶员非要脱衣服，有什么特别的理由吗……\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"那米哈游的成功是因为“懂二次元”吗？我觉得不是。我不是说米哈游不懂二次元，只是当时原神的取得的成功反而是来源于非二次元的部分，他是通过二次元以外的东西扩圈的，现在剧情与玩法都越来越偏向于带动画的RPG，也就美术的二次元味还比较重。不过前期我还是能感知到编剧在传说任务里狂卖角色那味，但又因为玩法够多，只当一个卡通风 RPG 游戏玩也还算能玩。只不过当对于角色塑造的执着超过了主流的认知，就会引发争议，“太二次元”才是每次争议时被抨击的点。如果只是做得很“懂二次元”，反而取得无法更大的成功。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"这就得说这就要说到原神的“抄袭”对象——塞尔达旷野之息。野炊是卡通渲染，但这游戏没有特别二次元的要素在里面。野炊出名是因为划世代的视听体验与玩法，和那些10个里5个在开美少女后宫卖麻辣2个在超雄高中生拯救世界1个在谈校园恋爱1个在开高达还有1个转生到异世界相比，完全不具备一般说起“二次元”的印象。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"原神一开始也做得很像纯 RPG——除了美术和抽卡。如果当成一般的游戏去玩，会觉得各种拉，我第一次玩时就是这样的视角，感觉非常一般，但能玩，而且在二次元游戏里，美术确实没得说。但如果是当成加了其他游戏要素的二次元游戏，这个游戏的质量就是断层，这可比 FGO 前期好过多了（不如说你月是公认的没有游戏性，连剧情都不行还玩啥）。我妈曾经毫不掩饰说她看不起日本动漫风格那种粗制滥造的小人，穿得还巾巾掉掉的。但我给她看到的第一个角色，香菱，她觉得很传统很好看。老实说连我都觉得香菱那股结合了二次元味的衣服穿得有点太少了。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"而被人诟病的二次元卖角色抽卡，这反而是我最不能理解的一点。之前的二游就是这样的，受众小不走量，利润上限设得很高。原神在一般向的内容中免费，在“二次元”向的内容中收费。换言之，二次元的受众不需要通过这个游戏才被“骗”成氪佬；而不是二次元的受众，也不会因为这个游戏被“逼”成氪佬。能玩的东西很多，为何只因抽卡在那里就视抽卡如洪水猛兽？有人将其视作赌博，但赌博至少骗你能赚到钱，可花钱抽卡去玩游戏明显是稳亏不赚。想了很久，目前不成熟的想法是，人们讨厌预期收益中会亏损的部分，会想补偿回来。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"假设收益固定，告诉你，我们游戏一个版本有两个新角色，每1个版本领养1个角色。当你领了20个角色后，可以兑换一个角色。如果你想要更多角色，则需要购买，原价1000元一个，商城里有优惠券，每月有一次30元抵160元券，68元抵160元券。每年有总计1500抵3000元券……此时瞬间从赌博游戏变成富人游戏，穷鬼一看那玩免费就可以了。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"如果把抽卡预期拉到2个版本1限定，则不会有任何失望，多抽到的都是赚到的。况且，这种游戏抽卡唯一的作用就是打高难。只不过国内应试体系对于成绩的追求，到工作各种证书 title 的追求，体现到游戏上似乎也有种收益要拿满的倾向。但当你放弃攀比，回到游戏只是娱乐时，对于游戏赌博的需求应当不复存在。\\\"\\n    })]\\n  });\\n}\\nfunction MDXContent(props = {}) {\\n  const {wrapper: MDXLayout} = props.components || ({});\\n  return MDXLayout ? _jsx(MDXLayout, {\\n    ...props,\\n    children: _jsx(_createMdxContent, {\\n      ...props\\n    })\\n  }) : _createMdxContent(props);\\n}\\nreturn {\\n  default: MDXContent\\n};\\n\",{\"_8\":64,\"_10\":65,\"_12\":67,\"_14\":15,\"_16\":68,\"_19\":70,\"_21\":71},\"2026-03-11 15:25:43\",[66],\"TODO\",[],[18,69],6,226,\"\\\"use strict\\\";\\nconst {Fragment: _Fragment, jsx: _jsx, jsxs: _jsxs} = arguments[0];\\nfunction _createMdxContent(props) {\\n  const _components = {\\n    p: \\\"p\\\",\\n    ...props.components\\n  }, {Tag} = _components;\\n  if (!Tag) _missingMdxReference(\\\"Tag\\\", true);\\n  return _jsxs(_Fragment, {\\n    children: [_jsxs(_components.p, {\\n      children: [\\\"还是把加锁功能赶紧开发出来吧，一直没有动力做这个事情，因为一但改格式就不可避免地还是会想去优化 memo 的 parsing。还是用的三年前写的 parsing。之前只想着希望性能可以好一点所以一股脑写了一大串过程式的写算法题一样的代码，代价就是当格式变复杂后就会变成难以维护的一大坨。如果是
