\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"那米哈游的成功是因为“懂二次元”吗？我觉得不是。我不是说米哈游不懂二次元，只是当时原神的取得的成功反而是来源于非二次元的部分，他是通过二次元以外的东西扩圈的，现在剧情与玩法都越来越偏向于带动画的RPG，也就美术的二次元味还比较重。不过前期我还是能感知到编剧在传说任务里狂卖角色那味，但又因为玩法够多，只当一个卡通风 RPG 游戏玩也还算能玩。只不过当对于角色塑造的执着超过了主流的认知，就会引发争议，“太二次元”才是每次争议时被抨击的点。如果只是做得很“懂二次元”，反而取得无法更大的成功。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"这就得说这就要说到原神的“抄袭”对象——塞尔达旷野之息。野炊是卡通渲染，但这游戏没有特别二次元的要素在里面。野炊出名是因为划世代的视听体验与玩法，和那些10个里5个在开美少女后宫卖麻辣2个在超雄高中生拯救世界1个在谈校园恋爱1个在开高达还有1个转生到异世界相比，完全不具备殊一般说起“二次元”的印象。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"原神一开始也做得很像纯 RPG——除了美术和抽卡。如果当成一般的游戏去玩，会觉得各种拉，我第一次玩时就是这样的视角，感觉非常一般，但能玩，而且在二次元游戏里，美术确实没得说。但如果是当成加了其他游戏要素的二次元游戏，这个游戏的质量就是断层，这可比 FGO 前期好过多了（不如说你月是公认的没有游戏性，连剧情都不行还玩啥）。我妈曾经毫不掩饰说她看不起日本动漫风格那种粗制滥造的小人，穿得还巾巾掉掉的。但我给她看到的第一个角色，香菱，她觉得很传统很好看。老实说连我都觉得香菱那股结合了二次元味的衣服穿得有点太少了。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"而被人诟病的二次元卖角色抽卡，这反而是我最不能理解的一点。之前的二游就是这样的，受众小不走量，利润上限设得很高。原神在一般向的内容中免费，在“二次元”向的内容中收费。换言之，二次元的受众不需要通过这个游戏才被“骗”成氪佬；而不是二次元的受众，也不会因为这个游戏被“逼”成氪佬。能玩的东西很多，为何只因抽卡在那里就视抽卡如洪水猛兽？有人将其视作赌博，但赌博至少骗你能赚到钱，可花钱抽卡去玩游戏明显是稳亏不赚。想了很久，目前不成熟的想法是，人们讨厌预期收益中会亏损的部分，会想补偿回来。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"假设收益固定，告诉你，我们游戏一个版本有两个新角色，每1个版本领养1个角色。当你领了20个角色后，可以兑换一个角色。如果你想要更多角色，则需要购买，原价1000元一个，商城里有优惠券，每月有一次30元抵160元券，68元抵160元券。每年有总计1500抵3000元券……此时瞬间从赌博游戏变成富人游戏，穷鬼一看那玩免费就可以了。\\\"\\n    }), \\\"\\\\n\\\", _jsx(_components.p, {\\n      children: \\\"如果把抽卡预期拉到2个版本1限定，则不会有任何失望，多抽到的都是赚到的。况且，这种游戏抽卡唯一的作用就是打高难。只不过国内应试体系对于成绩的追求，到工作各种证书 title 的追求，体现到游戏上似乎也有种收益要拿满的倾向。但当你放弃攀比，回到游戏只是娱乐时，对于游戏赌博的需求应当不复存在。\\\"\\n    })]\\n  });\\n}\\nfunction MDXContent(props = {}) {\\n  const {wrapper: MDXLayout} = props.components || ({});\\n  return MDXLayout ? _jsx(MDXLayout, {\\n    ...props,\\n    children: _jsx(_createMdxContent, {\\n      ...props\\n    })\\n  }) : _createMdxContent(props);\\n}\\nreturn {\\n  default: MDXContent\\n};\\n\",{\"_8\":24,\"_10\":25,\"_1
